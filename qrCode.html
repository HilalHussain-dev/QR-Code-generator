<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qr Code generator</title>
    <link rel="stylesheet" href="QrCode.css">
</head>
<body>
    <div class="Main">
        <p id="title">Welcome To Engineer Hilal Tools</p>
        <p id="enter">Enter URL or Text</p>
        <input type="text" placeholder="Text or URL" id = "qr-text">
        
    <div id="imgBox">
        <img id="qrImg">
    </div>
        <button onclick="generatorQR()" >Generate QR Code</button>
    </div>

    <script>
        let imageBox = document.getElementById("imgBox");
        let qrImg = document.getElementById("qrImg");
        let qrText = document.getElementById("qr-text");

        function generatorQR(){
        if (qrText.value.length > 0){
            qrImg.src = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + qrText.value; 
            imgBox.classList.add("show-img");
        }else{
            qrText.classList.add('error');
            setTimeout(() =>{
                qrText.classList.remove('error')
            },1000)
        }
        }
        
    </script>
</body>
</html>
